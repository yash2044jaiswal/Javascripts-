<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React</title>
</head>
<body>
    <button>click me</button>
    <script>
        class React{
            constructor(){
                this.library="React"
                this.server="https://localhost:3000"
                //recuirment
                document.querySelector('button').addEventListener('click',this.handeldclick.bind(this))
                
            }
            handeldclick(){
                console.log("btn clicked");
                console.log(this.server);
                
            }
        }
        const app=new React()
    </script>
</body>
</html>
