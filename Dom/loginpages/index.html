<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div action="" class="container" id="Signup">
        <h1 class="login-title">
            Signup
        </h1>
        <section class="input-box">
            <input type="text" name="username" id="username" placeholder="User Name" >
            <i class="bx bxs-user"></i>
        </section>
        <section class="input-box">
            <input type="text" name="username" id="email" placeholder="Enter Email"  >
            <i class="bx bxs-user"></i>
        </section>
        <section class="input-box">
            <input type="password" name="username" id="password"  minlength="8" maxlength="12" placeholder="password" >
            <i class="bx bxs-lock-alt"></i>
        </section>
        <button class="login-button" type="submit" id="submit">Signup</button>
        
    </div>
</body>
</html>
